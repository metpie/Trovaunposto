name: Controllo biglietti Trovaunposto

# Esegue il bot ogni 5 minuti (orario UTC) e quando lo avvii a mano.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

# Evita che due esecuzioni si sovrappongano.
concurrency:
  group: trovaunposto-check
  cancel-in-progress: false

permissions:
  contents: write   # serve per salvare lo stato dei biglietti gia' visti

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installa le dipendenze
        run: pip install -r requirements.txt

      - name: Esegui il bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python trovaunposto_bot.py

      - name: Salva stato e configurazione (se cambiati)
        run: |
          if [[ -n "$(git status --porcelain state/ config.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state/ config.json
            git commit -m "Aggiorna stato/ricerche [skip ci]"
            git push
          else
            echo "Nessun cambiamento."
          fi
